<!DOCTYPE html>
<html lang="en">
<!-- The HTML markup is based on the main page of Tasmota -->

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Owie - Developer Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-shell">
        <div id="statusHeader" class="header">
            <h2>Owie Developer Settings</h2>
            <div class="header-subtitle">(%DISPLAY_AP_NAME%)</div>
            <p></p>
            <form action="/wifi">
                <button>Wifi Configuration</button>
            </form>
            <p></p>
            <form action="/monitor">
                <button>Monitor BMS data</button>
            </form>
            <p>
                <button onclick="history.back()">Back</button>
            </p>
        </div>
    </div>
</body>

</html>
