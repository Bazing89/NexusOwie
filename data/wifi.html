<!DOCTYPE html>
<html lang="en">
<!-- The HTML markup is based on the main page of Tasmota -->

<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
        <title>Owie - Settings</title>
        <link rel="stylesheet" href="styles.css">
</head>

<body>
        <div class="app-shell">
                <div id="statusHeader" class="header">
                        <h2>Owie Settings</h2>
                        <div class="header-subtitle">(%DISPLAY_AP_NAME%)</div>
                </div>
                <form method="post" class="card">
                        <p>WiFi Network <b>to connect to</b><br><input placeholder="Type or Select your WiFi Network"
                                        value="%SSID%" name="s"></p>
                        <p><label><b>WiFi Password</b></label><br><input type="password"
                                        placeholder="Enter your WiFi Password" value="%PASS%" name="p"></p>
                        <button>Save</button>
                </form>
                <p>
                        <button onclick="history.back()">Back</button>
                </p>
        </div>
</body>

</html>
